<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Aurora background poster">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101517" />
      <stop offset="45%" stop-color="#233337" />
      <stop offset="100%" stop-color="#dfe7e3" />
    </linearGradient>
    <radialGradient id="tealGlow" cx="72%" cy="24%" r="54%">
      <stop offset="0%" stop-color="#8bd6d4" stop-opacity="0.75" />
      <stop offset="42%" stop-color="#55a8b0" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#55a8b0" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="violetGlow" cx="18%" cy="72%" r="52%">
      <stop offset="0%" stop-color="#9c8fcb" stop-opacity="0.48" />
      <stop offset="48%" stop-color="#80659a" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#80659a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="warmGlow" cx="54%" cy="18%" r="46%">
      <stop offset="0%" stop-color="#e6d4ad" stop-opacity="0.4" />
      <stop offset="56%" stop-color="#d9c6a3" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#d9c6a3" stop-opacity="0" />
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="52" />
    </filter>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="rgba(255,255,255,0.08)" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g filter="url(#softBlur)">
    <ellipse cx="1180" cy="230" rx="520" ry="260" fill="url(#tealGlow)" />
    <ellipse cx="380" cy="710" rx="460" ry="280" fill="url(#violetGlow)" />
    <ellipse cx="860" cy="180" rx="420" ry="210" fill="url(#warmGlow)" />
    <ellipse cx="960" cy="620" rx="540" ry="240" fill="url(#tealGlow)" opacity="0.55" />
  </g>

  <g opacity="0.22">
    <rect width="1600" height="900" fill="url(#grid)" />
  </g>

  <g opacity="0.12">
    <path
      d="M-120 840C180 560 540 520 860 660C1110 770 1360 760 1720 540"
      fill="none"
      stroke="#ffffff"
      stroke-width="28"
      stroke-linecap="round"
    />
    <path
      d="M-80 180C250 80 570 160 890 320C1170 460 1390 460 1700 330"
      fill="none"
      stroke="#ffffff"
      stroke-width="18"
      stroke-linecap="round"
    />
  </g>
</svg>
